<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperTrack — QP Parser</title>
<style>
  :root {
    --bg:#0f0f0d; --surface:#1a1a17; --surface2:#222220; --border:#2a2a27; --border2:#3a3a35;
    --text:#e8e8e3; --text2:#9a9a92; --text3:#6a6a62;
    --accent:#c9900a; --green:#5fb85f; --red:#e26b6b; --blue:#4aa3df;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
  h1{font-size:1.1rem;font-weight:600;margin-bottom:4px}
  .sub{color:var(--text2);font-size:.8rem;margin-bottom:16px}
  .bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
  select,input,button,textarea{font-family:inherit;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.85rem}
  button{cursor:pointer;background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
  button:hover{filter:brightness(1.1)}
  button.ghost{background:var(--surface2);color:var(--text);border-color:var(--border2);font-weight:500}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px;min-height:60vh}
  .panel-title{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  textarea{flex:1;resize:vertical;min-height:55vh;font-family:'SF Mono',Menlo,monospace;font-size:.78rem;line-height:1.45}
  pre{flex:1;overflow:auto;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:'SF Mono',Menlo,monospace;font-size:.74rem;line-height:1.5;white-space:pre;color:var(--text)}
  .diag{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:.82rem}
  .diag h3{font-size:.75rem;color:var(--text2);text-transform:uppercase;margin-bottom:6px;font-weight:600;letter-spacing:.5px}
  .diag-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  .stat{color:var(--text2)}
  .stat strong{color:var(--text);font-weight:600}
  .warn{color:var(--red);font-size:.78rem;margin-top:4px}
  .ok{color:var(--green)}
  .warn-list{max-height:140px;overflow:auto;background:var(--surface2);border-radius:4px;padding:6px 10px;margin-top:6px;font-size:.76rem;font-family:'SF Mono',monospace}
  .warn-list div{padding:2px 0;color:var(--text2)}
  .warn-list .lo{color:var(--accent)}
  label{font-size:.78rem;color:var(--text2);display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<h1>PaperTrack — Question Paper Parser</h1>
<div class="sub">Paste raw QP PDF text → get a <code>BAKED_TEMPLATES</code> snippet. No LLM, fully deterministic.</div>

<div class="bar">
  <label>Subject <select id="subject"><option value="physics">Physics (OCR H556)</option><option value="maths">Maths (Edexcel 9MA0)</option><option value="cs">CS (OCR H446)</option></select></label>
  <label>Paper <select id="paper"></select></label>
  <label>Year <input id="year" type="number" value="2024" style="width:80px"></label>
  <button onclick="run()">Parse →</button>
  <button class="ghost" onclick="copyOut()">Copy Output</button>
  <button class="ghost" onclick="clearAll()">Clear</button>
</div>

<div class="grid">
  <div class="panel">
    <div class="panel-title">Input — paste QP text</div>
    <textarea id="input" placeholder="Paste the raw text copied from a question paper PDF here (CTRL+A → CTRL+C in the PDF, then CTRL+V here)."></textarea>
  </div>
  <div class="panel">
    <div class="panel-title">Output — paste this into templates.js</div>
    <pre id="output">// Output will appear here after pressing Parse →</pre>
  </div>
</div>

<div class="diag">
  <h3>Diagnostics</h3>
  <div class="diag-row" id="stats"><span class="stat">Press Parse to see results</span></div>
  <div id="warns"></div>
</div>

// Populate paper dropdown from subject
// ═══════════════════════════════════════════════════════════════════
function refreshPaperDropdown() {
  const sub = document.getElementById('subject').value;
  const sel = document.getElementById('paper');
  sel.innerHTML = SUBJECTS[sub].paperKeys.map(p => `<option>${p}</option>`).join('');
}
document.getElementById('subject').addEventListener('change', refreshPaperDropdown);

// ═══════════════════════════════════════════════════════════════════
// CLEANING — strip page furniture from copied PDF text
// ═══════════════════════════════════════════════════════════════════
function cleanText(t) {
  return t
    .replace(/\r\n/g, '\n')
    // PMTEducation watermarks
    .replace(/PMTEducation/gi, '')
    .replace(/www\.pmt\.education/gi, '')
    // Copyright lines
    .replace(/© ?(OCR|Pearson|Pearson Education|Edexcel)[^\n]*/gi, '')
    .replace(/Copyright © [^\n]*/gi, '')
    // Page navigation
    .replace(/\bTurn over\s*►?/gi, '')
    .replace(/\bBLANK PAGE\b/gi, '')
    .replace(/\bEND OF (QUESTION )?PAPER\b/gi, '')
    .replace(/^\s*Section [AB]\s*$/gmi, '')
    // Instruction blocks
    .replace(/INSTRUCTIONS TO CANDIDATES[\s\S]*?(?=\n\s*\d+\s)/i, '')
    .replace(/INFORMATION FOR CANDIDATES[\s\S]*?(?=\n\s*\d+\s)/i, '')
    .replace(/Do not write outside the box[^\n]*/gi, '')
    // Long dotted answer spaces (replace with single newline)
    .replace(/\.{4,}/g, '')
    .replace(/_{4,}/g, '')
    // Paper codes
    .replace(/\b[A-Z]\d{3}\/0\d\b/g, '')
    // Standalone page numbers (line containing just a number 1-30)
    .replace(/^\s*\d{1,2}\s*$/gm, '')
    // Collapse 3+ blank lines to 2
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

// ═══════════════════════════════════════════════════════════════════
// PARSING — extract questions, parts, marks
// ═══════════════════════════════════════════════════════════════════

// Roman numerals i..xii
const ROMANS = ['i','ii','iii','iv','v','vi','vii','viii','ix','x','xi','xii'];
const ROMAN_SET = new Set(ROMANS);

function isRoman(s) { return ROMAN_SET.has(s.toLowerCase()); }
function isArabic(s) { return /^[1-9]\d?$/.test(s); }
function isLetter(s) { return /^[a-z]$/i.test(s); }

// Find part markers in a line.
// Matches: (a) | a) | (i) | (ii) | (1) at start (after optional whitespace).
// Returns {label, kind, rest} or null.
function detectPartMarker(line) {
  // (a), (i), (1) — parenthesised
  let m = line.match(/^\s*\(([a-z]{1,5}|\d{1,2})\)\s*(.*)$/i);
  if (!m) {
    // a), i), 1) — close-paren only
    m = line.match(/^\s*([a-z]|i{1,3}|iv|v|vi{0,3}|ix|x)\)\s*(.*)$/i);
  }
  if (!m) return null;
  const tok = m[1].toLowerCase();
  let kind;
  if (isRoman(tok)) kind = 'roman';
  else if (isLetter(tok)) kind = 'letter';
  else if (isArabic(tok)) kind = 'arabic';
  else return null;
  return { label: tok, kind, rest: m[2] };
}

// Detect a top-level question start: "16" or "16 " at start of line.
function detectQuestion(line) {
  const m = line.match(/^\s*(\d{1,2})\s+(.+)$/);
  if (!m) return null;
  const n = parseInt(m[1], 10);
  if (n < 1 || n > 30) return null;
  return { n, rest: m[2] };
}

// Extract mark count from a chunk of text. Looks for last [N] or (N) pattern.
function extractMarks(chunk) {
  // Prefer bracketed marks at end: [3] or [Total: 3 marks] or (3)
  const matches = [...chunk.matchAll(/\[(\d{1,2})\]|\((\d{1,2})\s*marks?\)|\[Total\s*[:=]?\s*(\d{1,2})\s*(?:marks?)?\]/gi)];
  if (matches.length === 0) return null;
  const last = matches[matches.length - 1];
  return parseInt(last[1] || last[2] || last[3], 10);
}

// State machine: walk lines, build questions[].parts[].
function parsePaper(text) {
  const lines = text.split('\n');
  const questions = [];
  let curQ = null;
  // stack: each entry is {label, kind, text:[]}
  let stack = [];
  // Buffer: lines that belong to the current "active" entity (question stem or deepest part)
  let buf = [];

  function flushBufToActive() {
    if (!curQ) { buf = []; return; }
    if (stack.length === 0) {
      // belongs to question stem
      curQ.stem.push(...buf);
    } else {
      stack[stack.length - 1].text.push(...buf);
    }
    buf = [];
  }

  function emitLeavesForQuestion(q) {
    // Walk the recorded parts tree. If a node has no children, it's a leaf.
    // We stored everything flat in q.partsFlat with depth info; rebuild leaves.
    if (q.partsFlat.length === 0) {
      // Whole question is one leaf
      const marks = extractMarks(q.stem.join('\n')) || 0;
      q.leafParts = [{ label: '', text: q.stem.join('\n'), marks }];
      return;
    }
    // Mark as leaf any part that has no child in the flat list following it at deeper depth before another sibling/shallower
    q.leafParts = [];
    for (let i = 0; i < q.partsFlat.length; i++) {
      const cur = q.partsFlat[i];
      const next = q.partsFlat[i+1];
      const isLeaf = !next || next.depth <= cur.depth;
      if (isLeaf) {
        const labelParts = [];
        // Reconstruct full label from ancestor stack at this point
        const ancestors = [];
        for (let j = i; j >= 0; j--) {
          const p = q.partsFlat[j];
          if (ancestors.length === 0 || p.depth < ancestors[ancestors.length-1].depth) {
            ancestors.push(p);
            if (p.depth === 0) break;
          }
        }
        ancestors.reverse();
        const label = ancestors.map(a => a.label).join(' ');
        const marks = extractMarks(cur.text) || 0;
        q.leafParts.push({ label, text: cur.text, marks, ancestors });
      }
    }
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();
    if (!trimmed) continue;

    // New question?
    const qMatch = detectQuestion(line);
    // Only treat as new question if not already inside a part AND number sequential or first
    if (qMatch && (
      !curQ ||
      (qMatch.n === (curQ.n + 1)) ||
      (!curQ && qMatch.n <= 30)
    )) {
      // Only accept if line doesn't also look like a part marker continuation
      flushBufToActive();
      if (curQ) {
        // Convert curQ's recorded structure into leaves
        emitLeavesForQuestion(curQ);
        questions.push(curQ);
      }
      curQ = { n: qMatch.n, stem: [], partsFlat: [] };
      buf = [qMatch.rest];
      stack = [];
      continue;
    }

    // Part marker?
    const pm = detectPartMarker(line);
    if (pm && curQ) {
      flushBufToActive();
      // Determine depth based on kind and current stack
      // Rules:
      //   letter → depth 0 (always pop back to root)
      //   roman  → depth 1 (must follow a letter; if no letter, depth 0)
      //   arabic → depth 2 (must follow roman; else fallback)
      let depth;
      if (pm.kind === 'letter') {
        depth = 0;
      } else if (pm.kind === 'roman') {
        const hasLetter = stack.some(s => s.kind === 'letter');
        depth = hasLetter ? 1 : 0;
      } else { // arabic
        const hasRoman = stack.some(s => s.kind === 'roman');
        const hasLetter = stack.some(s => s.kind === 'letter');
        depth = hasRoman ? 2 : (hasLetter ? 1 : 0);
      }
      // Pop stack down to depth, then push this
      while (stack.length > depth) stack.pop();
      const entry = { label: pm.label, kind: pm.kind, depth, text: [] };
      stack.push(entry);
      curQ.partsFlat.push(entry);
      buf = [pm.rest];
      continue;
    }

    // Regular content line — buffer it
    buf.push(trimmed);
  }
  flushBufToActive();
  if (curQ) {
    emitLeavesForQuestion(curQ);
    questions.push(curQ);
  }

  // Now fold text from each leaf's part chain into the .text field.
  for (const q of questions) {
    for (const leaf of q.leafParts) {
      // Combine ancestor texts (for context)
      const chain = leaf.ancestors || [];
      leaf.fullText = (q.stem.join(' ') + ' ' + chain.map(a => a.text.join(' ')).join(' ')).toLowerCase();
    }
  }

  return questions;
}

// ═══════════════════════════════════════════════════════════════════
// TOPIC TAGGING
// ═══════════════════════════════════════════════════════════════════
function scoreTopics(text, topicMap) {
  const scores = {};
  const lower = text.toLowerCase();
  for (const [topic, kws] of Object.entries(topicMap)) {
    let s = 0;
    for (const [kw, w] of kws) {
      // Whole-word/phrase match
      const re = new RegExp('(?:^|[^a-z0-9])' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?:[^a-z0-9]|$)', 'g');
      const matches = lower.match(re);
      if (matches) s += matches.length * w;
    }
    if (s > 0) scores[topic] = s;
  }
  return scores;
}

function tagPart(text, topicMap) {
  const scores = scoreTopics(text, topicMap);
  const ranked = Object.entries(scores).sort((a,b) => b[1] - a[1]);
  if (ranked.length === 0) {
    return { primary: 'Practical Skills & Data Analysis', topics: ['Practical Skills & Data Analysis'], confidence: 0 };
  }
  const primary = ranked[0][0];
  const primaryScore = ranked[0][1];
  const topics = [primary];
  // Add secondary if score >= 60% of primary AND >= 4
  if (ranked.length > 1 && ranked[1][1] >= Math.max(4, primaryScore * 0.6)) {
    topics.push(ranked[1][0]);
  }
  return { primary, topics, confidence: primaryScore };
}

// ═══════════════════════════════════════════════════════════════════
// EMIT — build the JS assignment
// ═══════════════════════════════════════════════════════════════════
function emit(subject, paperKey, year, questions) {
  const lines = [`BAKED_TEMPLATES['${subject}']['${paperKey}'][${year}] = [`];
  for (const q of questions) {
    if (q.leafParts.length === 1 && q.leafParts[0].label === '') {
      const p = q.leafParts[0];
      const topicsStr = p.tags.topics.map(t => `'${t.replace(/'/g, "\\'")}'`).join(', ');
      lines.push(`  { n:${q.n}, topic:'${p.tags.primary.replace(/'/g,"\\'")}', subtopic:'', parts:[{ l:'', topic:'${p.tags.primary.replace(/'/g,"\\'")}', topics:[${topicsStr}], subtopic:'', marks:${p.marks} }] },`);
    } else {
      // Primary topic of question = most common topic across leaves (by mark weight)
      const tally = {};
      for (const p of q.leafParts) {
        tally[p.tags.primary] = (tally[p.tags.primary] || 0) + p.marks;
      }
      const qPrimary = Object.entries(tally).sort((a,b)=>b[1]-a[1])[0][0];
      lines.push(`  { n:${q.n}, topic:'${qPrimary.replace(/'/g,"\\'")}', subtopic:'', parts:[`);
      for (const p of q.leafParts) {
        const topicsStr = p.tags.topics.map(t => `'${t.replace(/'/g, "\\'")}'`).join(', ');
        lines.push(`    { l:'${p.label}', topic:'${p.tags.primary.replace(/'/g,"\\'")}', topics:[${topicsStr}], subtopic:'', marks:${p.marks} },`);
      }
      lines.push(`  ]},`);
    }
  }
  lines.push(`];`);
  return lines.join('\n');
}

// ═══════════════════════════════════════════════════════════════════
// MAIN
// ═══════════════════════════════════════════════════════════════════
function run() {
  const subject = document.getElementById('subject').value;
  const paperKey = document.getElementById('paper').value;
  const year = parseInt(document.getElementById('year').value, 10);
  const raw = document.getElementById('input').value;
  if (!raw.trim()) {
    document.getElementById('output').textContent = '// Paste QP text first';
    return;
  }

  const cleaned = cleanText(raw);
  const questions = parsePaper(cleaned);
  const topicMap = SUBJECTS[subject].topics;

  // Tag each leaf
  const warnings = [];
  let totalParts = 0, totalMarks = 0;
  for (const q of questions) {
    for (const p of q.leafParts) {
      p.tags = tagPart(p.fullText, topicMap);
      totalParts++;
      totalMarks += p.marks;
      if (p.tags.confidence < 4) {
        warnings.push({ q: q.n, label: p.label, marks: p.marks, tag: p.tags.primary, conf: p.tags.confidence });
      }
      if (p.marks === 0) {
        warnings.push({ q: q.n, label: p.label, marks: 0, tag: 'MARKS', conf: 'missing', noMarks: true });
      }
    }
  }

  const out = emit(subject, paperKey, year, questions);
  document.getElementById('output').textContent = out;

  // Diagnostics
  const stats = document.getElementById('stats');
  stats.innerHTML = `
    <span class="stat">Questions: <strong>${questions.length}</strong></span>
    <span class="stat">Parts: <strong>${totalParts}</strong></span>
    <span class="stat">Total marks: <strong>${totalMarks}</strong></span>
    <span class="stat ${warnings.length === 0 ? 'ok' : ''}">${warnings.length === 0 ? '✓ No warnings' : `⚠ ${warnings.length} warning(s)`}</span>
  `;
  const warnDiv = document.getElementById('warns');
  if (warnings.length === 0) {
    warnDiv.innerHTML = '';
  } else {
    warnDiv.innerHTML = `<div class="warn-list">${warnings.map(w => {
      if (w.noMarks) return `<div class="lo">⚠ Q${w.q}${w.label?` (${w.label})`:''} — NO MARKS DETECTED</div>`;
      return `<div class="lo">Low confidence: Q${w.q}${w.label?` (${w.label})`:''} [${w.marks}m] → tagged "${w.tag}" (score ${w.conf})</div>`;
    }).join('')}</div>`;
  }
}

function copyOut() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const old = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = old, 1200);
  });
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('output').textContent = '// Output will appear here after pressing Parse →';
  document.getElementById('stats').innerHTML = '<span class="stat">Press Parse to see results</span>';
  document.getElementById('warns').innerHTML = '';
}
</script>
