<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperTrack — QP Parser</title>
<style>
  :root {
    --bg:#0f0f0d; --surface:#1a1a17; --surface2:#222220; --border:#2a2a27; --border2:#3a3a35;
    --text:#e8e8e3; --text2:#9a9a92; --text3:#6a6a62;
    --accent:#c9900a; --green:#5fb85f; --red:#e26b6b; --blue:#4aa3df;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
  h1{font-size:1.1rem;font-weight:600;margin-bottom:4px}
  .sub{color:var(--text2);font-size:.8rem;margin-bottom:16px}
  .bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
  select,input,button,textarea{font-family:inherit;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.85rem}
  button{cursor:pointer;background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
  button:hover{filter:brightness(1.1)}
  button.ghost{background:var(--surface2);color:var(--text);border-color:var(--border2);font-weight:500}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px;min-height:60vh}
  .panel-title{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  textarea{flex:1;resize:vertical;min-height:55vh;font-family:'SF Mono',Menlo,monospace;font-size:.78rem;line-height:1.45}
  pre{flex:1;overflow:auto;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:'SF Mono',Menlo,monospace;font-size:.74rem;line-height:1.5;white-space:pre;color:var(--text)}
  .diag{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:.82rem;margin-bottom:10px}
  .diag h3{font-size:.75rem;color:var(--text2);text-transform:uppercase;margin-bottom:6px;font-weight:600;letter-spacing:.5px}
  .diag-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  .stat{color:var(--text2)}
  .stat strong{color:var(--text);font-weight:600}
  .warn{color:var(--red);font-size:.78rem;margin-top:4px}
  .ok{color:var(--green)}
  .warn-list{max-height:160px;overflow:auto;background:var(--surface2);border-radius:4px;padding:6px 10px;margin-top:6px;font-size:.76rem;font-family:'SF Mono',monospace}
  .warn-list div{padding:2px 0;color:var(--text2)}
  .lo{color:var(--accent)!important}
  .er{color:var(--red)!important}
  label{font-size:.78rem;color:var(--text2);display:flex;align-items:center;gap:6px}
  details{margin-top:8px}
  summary{cursor:pointer;font-size:.75rem;color:var(--text3)}
  details pre{max-height:200px;overflow:auto;font-size:.7rem;margin-top:6px}
</style>
</head>
<body>
<h1>PaperTrack — Question Paper Parser</h1>
<div class="sub">Paste raw QP PDF text → get a <code>BAKED_TEMPLATES</code> snippet. No LLM needed.</div>

<div class="bar">
  <label>Subject <select id="subject"><option value="physics">Physics (OCR H556)</option><option value="maths">Maths (Edexcel 9MA0)</option><option value="cs">CS (OCR H446)</option></select></label>
  <label>Paper <select id="paper"></select></label>
  <label>Year <input id="year" type="number" value="2024" style="width:80px"></label>
  <button onclick="run()">Parse →</button>
  <button class="ghost" onclick="copyOut()">Copy Output</button>
  <button class="ghost" onclick="clearAll()">Clear</button>
</div>

<div class="grid">
  <div class="panel">
    <div class="panel-title">Input — paste QP text</div>
    <textarea id="input" placeholder="Paste raw text copied from a QP PDF (CTRL+A → CTRL+C in PDF viewer, then CTRL+V here)."></textarea>
  </div>
  <div class="panel">
    <div class="panel-title">Output — paste into templates.js</div>
    <pre id="output">// Output will appear here after pressing Parse →</pre>
  </div>
</div>

<div class="diag">
  <h3>Diagnostics</h3>
  <div class="diag-row" id="stats"><span class="stat">Press Parse to see results</span></div>
  <div id="warns"></div>
  <details id="debug-block" style="display:none">
    <summary>Debug — parsed structure</summary>
    <pre id="debug"></pre>
  </details>
</div>

function refreshPaperDropdown() {
  const sub = document.getElementById('subject').value;
  const sel = document.getElementById('paper');
  sel.innerHTML = SUBJECTS[sub].paperKeys.map(p => `<option>${p}</option>`).join('');
}
document.getElementById('subject').addEventListener('change', refreshPaperDropdown);
refreshPaperDropdown();

// ═══════════════════════════════════════════════════════════════════
// STEP 1: CLEAN — strip page furniture
// ═══════════════════════════════════════════════════════════════════
function cleanText(t) {
  return t
    .replace(/\r\n/g, '\n').replace(/\r/g, '\n')
    .replace(/PMTEducation/gi, '')
    .replace(/www\.pmt\.education/gi, '')
    .replace(/© ?(OCR|Pearson|Edexcel|Pearson Education)[^\n]*/gi, '')
    .replace(/Copyright ©[^\n]*/gi, '')
    .replace(/\bTurn over\s*[►▶→]?/gi, '')
    .replace(/\bBLANK PAGE\b/gi, '')
    .replace(/\bEND OF (QUESTION )?PAPER\b/gi, '')
    .replace(/Do not write outside[^\n]*/gi, '')
    .replace(/Do not write in [^\n]*/gi, '')
    .replace(/Answer on the dotted lines?[^\n]*/gi, '')
    .replace(/\.{5,}/g, ' ')   // dotted answer lines
    .replace(/_{5,}/g, ' ')    // underline answer lines
    .replace(/\b[A-Z]\d{3}\/0\d\b/g, '')  // paper codes e.g. H556/01
    .replace(/^\s*\d{1,2}\s*$/gm, '')     // standalone page numbers
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

const ROMANS = ['i','ii','iii','iv','v','vi','vii','viii','ix','x','xi','xii'];
const ROMAN_SET = new Set(ROMANS);

function tokenise(text) {
  const lines = text.split('\n');
  const tokens = [];

  for (const raw of lines) {
    const trimmed = raw.trim();
    if (!trimmed) continue;

    // Count leading spaces as indent level proxy
    const indent = raw.match(/^(\s*)/)[1].length;

    // ── Question number: "16" or "16 text..." at start of line with low indent
    // Require low indent (≤ 4 spaces) to avoid matching indented content
    if (indent <= 4) {
      const mq = raw.match(/^\s*(\d{1,2})\s*(.*)$/);
      if (mq) {
        const n = parseInt(mq[1], 10);
        if (n >= 1 && n <= 30) {
          const rest = mq[2].trim();
          tokens.push({ type: 'Q', n, rest, indent, raw });
          // If rest itself starts with a part marker e.g. "(a) text [2]", emit a synthetic PART
          const rpart = rest.match(/^\(([a-zA-Z]{1,5}|\d{1,2})\)\s*(.*)$/);
          if (rpart) {
            const lab = rpart[1].toLowerCase();
            let kind;
            if (ROMAN_SET.has(lab)) kind = 'roman';
            else if (/^[a-z]$/.test(lab)) kind = 'letter';
            else if (/^\d{1,2}$/.test(lab)) kind = 'arabic';
            if (kind) tokens.push({ type: 'PART', label: lab, kind, rest: rpart[2].trim(), indent, raw: rest });
          }
          continue;
        }
      }
    }

    // ── Part marker: (a), (b), (i), (ii), (1) — any indent
    const mpart = trimmed.match(/^\(([a-zA-Z]{1,5}|\d{1,2})\)\s*(.*)$/);
    if (mpart) {
      const lab = mpart[1].toLowerCase();
      let kind;
      if (ROMAN_SET.has(lab)) kind = 'roman';
      else if (/^[a-z]$/.test(lab)) kind = 'letter';
      else if (/^\d{1,2}$/.test(lab)) kind = 'arabic';
      if (kind) {
        tokens.push({ type: 'PART', label: lab, kind, rest: mpart[2].trim(), indent, raw });
        continue;
      }
    }

    // ── Mark line: just [N] or (N marks) alone or at end
    // Capture this as content — don't make it its own token type

    tokens.push({ type: 'TEXT', text: trimmed, indent, raw });
  }
  return tokens;
}

// ═══════════════════════════════════════════════════════════════════
// STEP 3: SEGMENT — group tokens into question → part chunks
// Strategy: walk tokens, maintain current Q and a part-label stack.
// Each leaf segment is {qn, label, depth, text[]}.
// ═══════════════════════════════════════════════════════════════════
function segment(tokens) {
  const segments = [];  // flat list of {qn, label, text[]}
  let curQn = null;
  // stack of {label, kind, depth}
  let partStack = [];

  function currentLabel() {
    return partStack.map(p => p.label).join(' ');
  }

  function depthFor(kind) {
    if (kind === 'letter') return 0;
    if (kind === 'roman') return 1;
    if (kind === 'arabic') return 2;
    return 0;
  }

  function openSeg(qn, label) {
    segments.push({ qn, label, text: [] });
  }

  function curSeg() {
    return segments[segments.length - 1] || null;
  }

  function appendText(line) {
    const s = curSeg();
    if (s) s.text.push(line);
  }

  // Detect if a Q token is genuinely a new question
  // (not a false positive like "2 marks" in body text)
  let lastQn = 0;

  function isPlausibleQuestion(tok) {
    if (tok.n <= lastQn) return false;
    // If we haven't seen any questions yet, accept anything 1-30
    // If we have, allow gaps up to 10 (some papers jump e.g. 1-15 MCQ then 16 long)
    if (lastQn > 0 && tok.n > lastQn + 10) return false;
    // Reject lines where the "rest" is clearly not a question
    const r = tok.rest.toLowerCase();
    if (/^(marks?|moles?|electrons?|newtons?|joules?|watts?|kg|ms\b|nm|dm|cm|mm\b|hz|pa|na|kj|kw)$/i.test(r)) return false;
    return true;
  }

  for (const tok of tokens) {
    if (tok.type === 'Q') {
      if (isPlausibleQuestion(tok)) {
        lastQn = tok.n;
        curQn = tok.n;
        partStack = [];
        openSeg(curQn, '');  // question-level segment (for whole-question mark or MCQ)
        if (tok.rest) appendText(tok.rest);
        continue;
      }
      // Fall through — treat as text
    }

    if (tok.type === 'PART' && curQn !== null) {
      const depth = depthFor(tok.kind);
      // Pop stack down to this depth
      while (partStack.length > depth) partStack.pop();
      partStack.push({ label: tok.label, kind: tok.kind, depth });
      openSeg(curQn, currentLabel());
      if (tok.rest) appendText(tok.rest);
      continue;
    }

    // TEXT (or rejected Q token) — append to current segment
    if (curQn !== null) appendText(tok.text || tok.raw.trim());
  }

  return segments;
}

// ═══════════════════════════════════════════════════════════════════
// STEP 4: Extract marks from a segment's text
// ═══════════════════════════════════════════════════════════════════
function extractMarks(textArr) {
  const blob = textArr.join(' ');
  // Look for [N] — prefer the LAST one which is typically the mark allocation
  const allMatches = [...blob.matchAll(/\[(\d{1,2})\]/g)];
  if (allMatches.length > 0) {
    return parseInt(allMatches[allMatches.length - 1][1], 10);
  }
  // Also try "(N marks)"
  const m2 = blob.match(/\((\d{1,2})\s*marks?\)/i);
  if (m2) return parseInt(m2[1], 10);
  return 0;
}

// ═══════════════════════════════════════════════════════════════════
// STEP 5: Build question objects from segments
// A "leaf" segment is one with no children (no later segment for same
// question starts with a label that extends this one).
// ═══════════════════════════════════════════════════════════════════
function buildQuestions(segments) {
  // Group by qn
  const byQ = {};
  for (const seg of segments) {
    if (!byQ[seg.qn]) byQ[seg.qn] = [];
    byQ[seg.qn].push(seg);
  }

  const questions = [];
  for (const qn of Object.keys(byQ).map(Number).sort((a,b) => a-b)) {
    const segs = byQ[qn];
    // Find leaves: a segment is a leaf if no later segment's label starts with this one's label
    // (and this one's label is non-empty, OR there's only one segment with empty label)
    const leaves = [];
    for (let i = 0; i < segs.length; i++) {
      const s = segs[i];
      const label = s.label;
      const isParent = segs.some((other, j) =>
        j !== i &&
        other.label !== label &&
        other.label.startsWith(label) &&
        (label === '' || other.label[label.length] === ' ')
      );
      if (!isParent) leaves.push(s);
    }

    // For a leaf with empty label, it's the whole-question segment.
    // If there are other leaves with non-empty labels, drop the empty-label one
    // (its content is the question stem, already captured via appendText at part level)
    const realLeaves = leaves.filter(l => l.label !== '').length > 0
      ? leaves.filter(l => l.label !== '')
      : leaves;

    // Build context text (all text across the question for topic tagging)
    const allText = segs.flatMap(s => s.text).join(' ');

    questions.push({
      n: qn,
      allText: allText.toLowerCase(),
      parts: realLeaves.map(l => ({
        label: l.label,
        marks: extractMarks(l.text),
        text: l.text.join(' ').toLowerCase(),
      }))
    });
  }
  return questions;
}

// ═══════════════════════════════════════════════════════════════════
// STEP 6: Topic tagging
// ═══════════════════════════════════════════════════════════════════
function scoreTopics(text, topicMap) {
  const scores = {};
  for (const [topic, kws] of Object.entries(topicMap)) {
    let s = 0;
    for (const [kw, w] of kws) {
      const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp('(?:^|[^a-z0-9])' + escaped + '(?:[^a-z0-9]|$)', 'g');
      const hits = (text.match(re) || []).length;
      s += hits * w;
    }
    if (s > 0) scores[topic] = s;
  }
  return scores;
}

function tagPart(partText, allQText, topicMap, defaultTopic) {
  // Use part text + question context
  const combined = partText + ' ' + allQText;
  const scores = scoreTopics(combined, topicMap);
  const ranked = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  if (ranked.length === 0) {
    return { primary: defaultTopic, topics: [defaultTopic], confidence: 0 };
  }
  const primary = ranked[0][0];
  const primaryScore = ranked[0][1];
  const topics = [primary];
  // Secondary topic if score ≥ 60% of primary and ≥ 3
  if (ranked.length > 1 && ranked[1][1] >= 3 && ranked[1][1] >= primaryScore * 0.6) {
    topics.push(ranked[1][0]);
  }
  return { primary, topics, confidence: primaryScore };
}

// ═══════════════════════════════════════════════════════════════════
// STEP 7: Emit JS snippet
// ═══════════════════════════════════════════════════════════════════
function q(s) { return `'${s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}'`; }

function emit(subject, paperKey, year, questions) {
  const lines = [`BAKED_TEMPLATES[${q(subject)}][${q(paperKey)}][${year}] = [`];
  for (const qObj of questions) {
    if (qObj.parts.length === 1 && qObj.parts[0].label === '') {
      const p = qObj.parts[0];
      const topicsStr = p.tag.topics.map(q).join(', ');
      lines.push(`  { n:${qObj.n}, topic:${q(p.tag.primary)}, subtopic:'', parts:[{ l:'', topic:${q(p.tag.primary)}, topics:[${topicsStr}], subtopic:'', marks:${p.marks} }] },`);
    } else {
      // Question-level primary = topic with most marks
      const tally = {};
      for (const p of qObj.parts) {
        tally[p.tag.primary] = (tally[p.tag.primary] || 0) + p.marks;
      }
      const qPrimary = Object.entries(tally).sort((a,b) => b[1]-a[1])[0][0];
      lines.push(`  { n:${qObj.n}, topic:${q(qPrimary)}, subtopic:'', parts:[`);
      for (const p of qObj.parts) {
        const topicsStr = p.tag.topics.map(q).join(', ');
        lines.push(`    { l:${q(p.label)}, topic:${q(p.tag.primary)}, topics:[${topicsStr}], subtopic:'', marks:${p.marks} },`);
      }
      lines.push(`  ]},`);
    }
  }
  lines.push(`];`);
  return lines.join('\n');
}

// ═══════════════════════════════════════════════════════════════════
// MAIN
// ═══════════════════════════════════════════════════════════════════
function run() {
  const out = document.getElementById('output');
  const statsEl = document.getElementById('stats');
  const warnsEl = document.getElementById('warns');
  const debugEl = document.getElementById('debug');
  const debugBlock = document.getElementById('debug-block');

  try {
    const subject = document.getElementById('subject').value;
    const paperKey = document.getElementById('paper').value;
    const year = parseInt(document.getElementById('year').value, 10);
    const raw = document.getElementById('input').value;

    if (!raw.trim()) {
      out.textContent = '// Paste QP text first';
      return;
    }

    const topicMap = SUBJECTS[subject].topics;
    const topicNames = Object.keys(topicMap);
    const defaultTopic = topicNames[0];

    // Pipeline
    const cleaned = cleanText(raw);
    const tokens = tokenise(cleaned);
    const segs = segment(tokens);
    const questions = buildQuestions(segs);

    if (questions.length === 0) {
      out.textContent = '// No questions detected. Check input format — question numbers must appear at the start of lines with low indentation (e.g. "16 (a) text [2]").';
      statsEl.innerHTML = '<span class="stat er">⚠ 0 questions detected</span>';
      // Show debug
      debugEl.textContent = 'TOKENS:\n' + tokens.slice(0,40).map(t => JSON.stringify(t)).join('\n');
      debugBlock.style.display = '';
      return;
    }

    // Tag all parts
    const warnings = [];
    let totalParts = 0, totalMarks = 0;
    for (const qObj of questions) {
      for (const p of qObj.parts) {
        p.tag = tagPart(p.text, qObj.allText, topicMap, defaultTopic);
        totalParts++;
        totalMarks += p.marks;
        if (p.tag.confidence < 3) {
          warnings.push({ q: qObj.n, label: p.label, marks: p.marks, tag: p.tag.primary, conf: p.tag.confidence });
        }
        if (p.marks === 0) {
          warnings.push({ q: qObj.n, label: p.label, noMarks: true });
        }
      }
    }

    out.textContent = emit(subject, paperKey, year, questions);

    // Stats
    statsEl.innerHTML = `
      <span class="stat">Questions: <strong>${questions.length}</strong></span>
      <span class="stat">Parts: <strong>${totalParts}</strong></span>
      <span class="stat">Total marks: <strong>${totalMarks}</strong></span>
      <span class="stat ${warnings.length === 0 ? 'ok' : ''}">${warnings.length === 0 ? '✓ No warnings' : `⚠ ${warnings.length} warning(s)`}</span>
    `;

    const uniqueWarns = [...new Map(warnings.map(w => [JSON.stringify(w), w])).values()];
    warnsEl.innerHTML = uniqueWarns.length ? `<div class="warn-list">${uniqueWarns.map(w =>
      w.noMarks
        ? `<div class="lo">⚠ Q${w.q}${w.label ? ' ('+w.label+')' : ''} — no marks detected</div>`
        : `<div class="lo">Low confidence: Q${w.q}${w.label ? ' ('+w.label+')' : ''} [${w.marks}m] → "${w.tag}" (score ${w.conf})</div>`
    ).join('')}</div>` : '';

    // Debug
    debugEl.textContent = questions.map(q =>
      `Q${q.n}: ${q.parts.map(p => `[${p.label||'whole'}](${p.marks}m)`).join(', ')}`
    ).join('\n');
    debugBlock.style.display = '';

  } catch(e) {
    out.textContent = '// Error: ' + e.message + '\n\n// Stack:\n// ' + (e.stack||'').split('\n').join('\n// ');
    statsEl.innerHTML = `<span class="stat er">Error: ${e.message}</span>`;
    debugBlock.style.display = '';
  }
}

function copyOut() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const old = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = old, 1200);
  }).catch(() => {
    // fallback
    const ta = document.getElementById('output');
    const range = document.createRange();
    range.selectNodeContents(ta);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
  });
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('output').textContent = '// Output will appear here after pressing Parse →';
  document.getElementById('stats').innerHTML = '<span class="stat">Press Parse to see results</span>';
  document.getElementById('warns').innerHTML = '';
  document.getElementById('debug').textContent = '';
  document.getElementById('debug-block').style.display = 'none';
}
</script>
